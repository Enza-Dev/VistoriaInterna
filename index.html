<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vistoria Digital - ENZA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* --- INTERFACE TABLET --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding-bottom: 90px; }
        .container { background: white; padding: 20px; max-width: 900px; margin: 20px auto; border-radius: 12px; }
        
        .header-tablet { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #003399; padding-bottom: 10px; margin-bottom: 20px; }
        .logo-img-t { height: 45px; object-fit: contain; }

        .config-box { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; display: flex; gap: 20px; align-items: center; }
        .config-box div { display: flex; align-items: center; gap: 8px; }
        .config-box input { border: none; border-bottom: 2px solid #003399; background: transparent; font-size: 18px; text-align: center; font-weight: bold; outline: none; }

        .setor-card { margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; overflow: hidden; }
        .setor-header { background: #003399; color: white; padding: 15px; font-weight: bold; cursor: pointer; list-style: none; }
        .item-details { border-bottom: 1px solid #eee; background: #fff; }
        .item-summary { padding: 15px; font-weight: 600; cursor: pointer; list-style: none; background: #fafafa; }
        
        .form-body { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .field-group { display: flex; flex-direction: column; gap: 5px; }
        .field-group label { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; width: 100%; }

        .btn-group { display: flex; gap: 10px; }
        .btn-status { flex: 1; padding: 14px; border: 2px solid #ccc; border-radius: 8px; font-weight: bold; cursor: pointer; background: white; font-size: 16px; }
        .btn-ok.active { background: #27ae60; color: white; border-color: #27ae60; }
        .btn-x.active { background: #e74c3c; color: white; border-color: #e74c3c; }

        .footer-actions { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: flex; gap: 10px; box-shadow: 0 -3px 10px rgba(0,0,0,0.1); z-index: 100; }
        .btn-action { flex: 1; padding: 18px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        .save { background: #2c3e50; }
        .pdf { background: #c0392b; }

        /* --- PDF LAYOUT (A4 HORIZONTAL) --- */
        #pdf-template { display: none; width: 287mm; background: white; padding: 5mm; color: black; }
        .pdf-header-table { width: 100%; border-collapse: collapse; }
        .pdf-header-table td { border: 1px solid #000; padding: 8px; text-align: center; vertical-align: middle; }
        .logo-img-pdf { height: 35px; width: auto; max-width: 150px; }

        .pdf-table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-top: -1px; }
        .pdf-table th, .pdf-table td { border: 1px solid #000; padding: 3px 2px; text-align: center; font-size: 7.5px; word-wrap: break-word; }
        .pdf-table th { background: #f2f2f2; font-weight: bold; text-transform: uppercase; }
        
        .col-local { width: 50px; font-weight: bold; }
        .col-item { width: 90px; text-align: left !important; padding-left: 4px !important; }
        .col-st { width: 25px; font-weight: bold; }
        .col-prob { width: 110px; }
        .col-data { width: 48px; }
        .col-user { width: 55px; }
        .col-sol { width: 130px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-tablet">
        <img src="logo_village.png" class="logo-img-t" alt="Village">
        <img src="logo_enza.png" class="logo-img-t" alt="Enza">
    </div>

    <div class="config-box">
        <div><label>TORRE:</label><input type="text" id="torre-val" placeholder="D" maxlength="2" style="width:50px;" oninput="autoSave()"></div>
        <div><label>APTO:</label><input type="text" id="apto-val" placeholder="00" style="width:70px;" oninput="autoSave()"></div>
    </div>

    <div id="content"></div>
</div>

<div id="pdf-template">
    <table class="pdf-header-table">
        <tr>
            <td style="width: 20%;"><img src="logo_village.png" class="logo-img-pdf"></td>
            <td style="width: 60%;">
                <div style="font-size: 14px; font-weight: bold;">Vistoria Interna - Torre <span id="pdf-torre-text"></span></div>
                <div style="font-size: 16px; margin-top: 5px; font-weight: bold;">Apto: <span id="pdf-apto-text"></span></div>
            </td>
            <td style="width: 20%;"><img src="logo_enza.png" class="logo-img-pdf"></td>
        </tr>
    </table>
    
    <table class="pdf-table">
        <thead>
            <tr>
                <th class="col-local">Local</th><th class="col-item">Item</th><th class="col-st">Status</th><th class="col-prob">Problema</th><th class="col-data">Data</th><th class="col-user">Vistoriador</th><th class="col-user">Responsável</th><th class="col-st">Status 2</th><th class="col-sol">Solução</th><th class="col-data">Data 2</th><th class="col-user">Vistoriador</th><th class="col-user">Responsável</th>
            </tr>
        </thead>
        <tbody id="pdf-table-body"></tbody>
    </table>
</div>

<div class="footer-actions">
    <button class="btn-action save" onclick="manualSave()">SALVAR</button>
    <button class="btn-action pdf" onclick="exportPDF()">GERAR PDF</button>
</div>

<script>
    const db = [
        { local: "Sala de Estar / Jantar", itens: ["Tomadas, interruptores", "Paredes", "Teto", "Esquadrias Madeiras", "Esquadrias Metálicas", "Rodapé", "Pintura", "Gradil Varanda", "Interfone"] },
        { local: "Quarto 1", itens: ["Tomadas, interruptores", "Paredes", "Teto", "Esquadrias Madeiras", "Esquadrias Metálicas", "Pintura"] },
        { local: "Quarto 2", itens: ["Tomadas, interruptores", "Paredes", "Teto", "Esquadrias Madeiras", "Esquadrias Metálicas", "Pintura"] },
        { local: "Banheiro", itens: ["Torneiras", "Vasos sanitários", "Ponto Chuveiro", "Ralo", "Pia", "Esquadrias Metálicas", "Esquadrias de Madeira", "Revestimento Cerâmico", "Pintura", "Tomadas, interruptores"] },
        { local: "Cozinha / Área de Serviço", itens: ["Revestimento Cerâmico", "Torneiras", "Ralos", "Pia", "Esquadrias Metálicas", "Pintura", "Tomadas, interruptores"] }
    ];

    function init() {
        const saved = JSON.parse(localStorage.getItem('enza_v_final_v11')) || {};
        document.getElementById('torre-val').value = saved.torre || "";
        document.getElementById('apto-val').value = saved.apto || "";
        const container = document.getElementById('content');

        db.forEach((setor, sIdx) => {
            const sec = document.createElement('details');
            sec.className = 'setor-card';
            sec.innerHTML = `<summary class="setor-header">${setor.local}</summary><div id="sec-${sIdx}"></div>`;
            container.appendChild(sec);

            setor.itens.forEach((item, iIdx) => {
                const id = `s${sIdx}i${iIdx}`;
                const v = saved[id] || { s1:'', pr:'', d1:'', v1:'', r1:'', s2:'', sl:'', d2:'', v2:'', r2:'' };
                const det = document.createElement('details');
                det.className = 'item-details';
                det.innerHTML = `
                    <summary class="item-summary">${item}</summary>
                    <div class="form-body" data-id="${id}">
                        <div class="field-group"><label>Status 01</label><div class="btn-group"><button class="btn-status btn-ok ${v.s1==='OK'?'active':''}" onclick="setStatus(this,'OK')">OK</button><button class="btn-status btn-x ${v.s1==='X'?'active':''}" onclick="setStatus(this,'X')">X</button></div></div>
                        <div class="field-group"><label>Problema</label><input type="text" value="${v.pr}" oninput="autoSave()"></div>
                        <div style="display:flex; gap:5px;"><input type="date" value="${v.d1}" oninput="autoSave()"><input type="text" value="${v.v1}" placeholder="Vistoriador" oninput="autoSave()"><input type="text" value="${v.r1}" placeholder="Responsável" oninput="autoSave()"></div>
                        <hr style="margin:10px 0; border:0; border-top:1px dashed #ccc;">
                        <div class="field-group"><label>Status 02</label><div class="btn-group"><button class="btn-status btn-ok ${v.s2==='OK'?'active':''}" onclick="setStatus(this,'OK')">OK</button><button class="btn-status btn-x ${v.s2==='X'?'active':''}" onclick="setStatus(this,'X')">X</button></div></div>
                        <div class="field-group"><label>Solução</label><input type="text" value="${v.sl}" oninput="autoSave()"></div>
                        <div style="display:flex; gap:5px;"><input type="date" value="${v.d2}" oninput="autoSave()"><input type="text" value="${v.v2}" placeholder="Vistoriador" oninput="autoSave()"><input type="text" value="${v.r2}" placeholder="Responsável" oninput="autoSave()"></div>
                    </div>
                `;
                document.getElementById(`sec-${sIdx}`).appendChild(det);
            });
        });
    }

    function setStatus(btn, st) { 
        btn.parentElement.querySelectorAll('.btn-status').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); 
        autoSave(); 
    }

    function autoSave() {
        const data = { torre: document.getElementById('torre-val').value, apto: document.getElementById('apto-val').value };
        document.querySelectorAll('.form-body').forEach(el => {
            const id = el.dataset.id;
            const btns = el.querySelectorAll('.btn-group');
            const ins = el.querySelectorAll('input');
            data[id] = { 
                s1: btns[0].querySelector('.active')?.innerText || '', 
                pr: ins[0].value, d1: ins[1].value, v1: ins[2].value, r1: ins[3].value,
                s2: btns[1].querySelector('.active')?.innerText || '', 
                sl: ins[4].value, d2: ins[5].value, v2: ins[6].value, r2: ins[7].value 
            };
        });
        localStorage.setItem('enza_v_final_v11', JSON.stringify(data));
    }

    function manualSave() { autoSave(); alert("Dados salvos!"); }

    function exportPDF() {
        autoSave();
        document.getElementById('pdf-torre-text').innerText = document.getElementById('torre-val').value;
        document.getElementById('pdf-apto-text').innerText = document.getElementById('apto-val').value;
        const tbody = document.getElementById('pdf-table-body'); 
        tbody.innerHTML = "";
        const savedData = JSON.parse(localStorage.getItem('enza_v_final_v11'));

        db.forEach((setor, sIdx) => {
            setor.itens.forEach((item, iIdx) => {
                const d = savedData[`s${sIdx}i${iIdx}`];
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    ${iIdx === 0 ? `<td rowspan="${setor.itens.length}" class="col-local">${setor.local}</td>` : ''}
                    <td class="col-item">${item}</td>
                    <td class="col-st" style="color:${d.s1==='X'?'red':'green'}">${d.s1}</td>
                    <td>${d.pr}</td><td>${d.d1}</td><td>${d.v1}</td><td>${d.r1}</td>
                    <td class="col-st" style="color:${d.s2==='X'?'red':'green'}">${d.s2}</td>
                    <td>${d.sl}</td><td>${d.d2}</td><td>${d.v2}</td><td>${d.r2}</td>
                `;
                tbody.appendChild(tr);
            });
        });

        const element = document.getElementById('pdf-template');
        element.style.display = 'block';
        
        const opt = { 
            margin: 0, 
            filename: `Vistoria_Torre${document.getElementById('torre-val').value}_Apto${document.getElementById('apto-val').value}.pdf`, 
            html2canvas: { scale: 2, logging: false }, 
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' } 
        };

        html2pdf().set(opt).from(element).save().then(() => {
            element.style.display = 'none';
        });
    }
    init();
</script>
</body>
</html>
