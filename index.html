<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vistoria Interna - ENZA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* --- INTERFACE TABLET --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding-bottom: 90px; }
        .container { background: white; padding: 20px; max-width: 900px; margin: 20px auto; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .header-tablet { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #003399; padding-bottom: 10px; margin-bottom: 20px; }
        .logo-img-t { height: 45px; object-fit: contain; }

        .config-box { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; }
        .config-box div { display: flex; flex-direction: column; gap: 5px; }
        .config-box label { font-size: 11px; font-weight: bold; color: #003399; }
        .config-box input, .config-box select { border: none; border-bottom: 2px solid #003399; background: transparent; font-size: 15px; font-weight: bold; outline: none; padding: 5px 0; font-family: inherit; color: #333; }
        .config-box select { cursor: pointer; }

        .setor-card { margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; overflow: hidden; }
        .setor-header { background: #003399; color: white; padding: 15px; font-weight: bold; cursor: pointer; list-style: none; }
        .item-details { border-bottom: 1px solid #eee; background: #fff; }
        .item-summary { padding: 15px; font-weight: 600; cursor: pointer; list-style: none; background: #fafafa; border-left: 4px solid transparent; }
        details[open] > .item-summary { border-left-color: #003399; background: #f0f7ff; }
        
        .form-body { padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Bloco Simplificado (Único por item) */
        .problem-block { background: #fff; display: grid; grid-template-columns: 200px 1fr 240px; gap: 15px; align-items: start; }
        
        @media (max-width: 768px) {
            .problem-block { grid-template-columns: 1fr; }
        }
        
        .field-group { display: flex; flex-direction: column; gap: 5px; height: 100%; }
        .field-group label { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; }
        
        textarea { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; width: 100%; font-family: inherit; resize: vertical; min-height: 80px; flex-grow: 1; }

        .btn-group { display: flex; gap: 5px; height: 100%; }
        .btn-status { flex: 1; border: 2px solid #ccc; border-radius: 8px; font-weight: bold; cursor: pointer; background: white; font-size: 13px; min-height: 50px; }
        .btn-aprovado.active { background: #27ae60; color: white; border-color: #27ae60; }
        .btn-pendente.active { background: #f1c40f; color: black; border-color: #f1c40f; }

        /* Upload de Foto */
        .upload-container { display: flex; flex-direction: column; gap: 5px; width: 100%; }
        .foto-upload-btn { width: 100%; background: #f0f2f5; border: 1px dashed #999; border-radius: 6px; text-align: center; cursor: pointer; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; padding: 12px; min-height: 50px; }
        .foto-upload-btn input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        
        .fotos-preview-container { display: flex; gap: 5px; width: 100%; }
        .img-preview-box { flex: 1; position: relative; }
        .img-preview { width: 100%; height: 60px; object-fit: cover; border-radius: 4px; }
        .btn-remove-foto { position: absolute; top: -5px; right: -5px; background: #e74c3c; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .footer-actions { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: flex; gap: 10px; box-shadow: 0 -3px 10px rgba(0,0,0,0.1); z-index: 100; }
        .btn-action { flex: 1; padding: 18px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        .save { background: #2c3e50; }
        .pdf { background: #c0392b; }

        /* --- PDF LAYOUT --- */
        #pdf-template { display: none; width: 287mm; background: white; padding: 5mm; color: black; }
        .pdf-header-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        .pdf-header-table td { border: 1px solid #000; padding: 8px; text-align: center; vertical-align: middle; }
        .logo-img-pdf { height: 35px; width: auto; max-width: 150px; }

        .pdf-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .pdf-table th, .pdf-table td { border: 1px solid #000; padding: 5px; text-align: center; font-size: 9px; vertical-align: middle; }
        .pdf-table th { background: #f2f2f2; font-weight: bold; text-transform: uppercase; }
        
        .col-local { width: 15%; font-weight: bold; }
        .col-item { width: 15%; text-align: left !important; padding-left: 5px !important; }
        .col-st { width: 10%; font-weight: bold; font-size: 10px;}
        .col-obs { width: 30%; text-align: left !important; padding-left: 5px !important; }
        .col-foto { width: 30%; }
        .pdf-img { max-height: 70px; max-width: 31%; object-fit: contain; border-radius: 4px; display: inline-block; margin: 0 1%; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-tablet">
        <img src="logo_village.png" class="logo-img-t" alt="Village" onerror="this.style.display='none'">
        <img src="logo_enza.png" class="logo-img-t" alt="Enza" onerror="this.style.display='none'">
    </div>

    <div class="config-box">
        <div>
            <label>MODELO DE VISTORIA</label>
            <select id="modelo-val" onchange="changeModelo()">
                <option value="jabuticabeiras">Jabuticabeiras</option>
                <option value="palmeiras_comum">Palmeira Real</option>
                <option value="palmeiras_duplex">Palmeira Real Duplex</option>
                <option value="sagrados">Sagrados Corações</option>
            </select>
        </div>
        <div><label>BLOCO/TORRE</label><input type="text" id="bloco-val" placeholder="A" oninput="autoSave()"></div>
        <div><label>APTO</label><input type="text" id="apto-val" placeholder="00" oninput="autoSave()"></div>
        <div><label>VISTORIADOR</label><input type="text" id="resp-val" placeholder="Nome" oninput="autoSave()"></div>
        <div><label>DATA</label><input type="date" id="data-val" oninput="autoSave()"></div>
    </div>

    <div id="content"></div>
</div>

<div id="pdf-template">
    <table class="pdf-header-table">
        <tr>
            <td style="width: 20%;"><img src="logo_village.png" class="logo-img-pdf" onerror="this.style.display='none'"></td>
            <td style="width: 60%;">
                <div style="font-size: 16px; font-weight: bold;">RELATÓRIO DE VISTORIA INTERNA DO IMOVEL - <span id="pdf-modelo-text"></span></div>
                <div style="font-size: 14px; margin-top: 5px;"><b>Bloco:</b> <span id="pdf-bloco-text"></span> | <b>Apto:</b> <span id="pdf-apto-text"></span></div>
                <div style="font-size: 11px; margin-top: 5px;">
                    Resp: <span id="pdf-resp-text"></span> | Data: <span id="pdf-data-text"></span>
                </div>
            </td>
            <td style="width: 20%;"><img src="logo_enza.png" class="logo-img-pdf" onerror="this.style.display='none'"></td>
        </tr>
    </table>
    
    <table class="pdf-table">
        <thead>
            <tr>
                <th class="col-local">Local</th>
                <th class="col-item">Item</th>
                <th class="col-st">Status</th>
                <th class="col-obs">Observação</th>
                <th class="col-foto">Fotos</th>
            </tr>
        </thead>
        <tbody id="pdf-table-body"></tbody>
    </table>
</div>

<div class="footer-actions">
    <button class="btn-action save" onclick="manualSave()">SALVAR DADOS</button>
    <button class="btn-action pdf" onclick="exportPDF()">GERAR PDF</button>
</div>

<script>
    // Listas padronizadas para facilitar a montagem dos templates
    const itensSala = ["Tomadas, interruptores", "Paredes", "Teto", "Esquadrias Madeiras", "Esquadrias Metálicas", "Rodapé", "Pintura", "Gradil Varanda", "Interfone"];
    const itensQuarto = ["Tomadas, interruptores", "Paredes", "Teto", "Esquadrias Madeiras", "Esquadrias Metálicas", "Pintura"];
    const itensBanheiro = ["Torneiras", "Vasos sanitários", "Ponto Chuveiro", "Ralo", "Pia", "Esquadrias Metálicas", "Esquadrias de Madeira", "Revestimento Cerâmico", "Pintura", "Tomadas, interruptores"];
    const itensCozinha = ["Revestimento Cerâmico", "Torneiras", "Ralos", "Pia", "Esquadrias Metálicas", "Pintura", "Tomadas, interruptores"];

    // Estruturas de acordo com os empreendimentos
    const templates = {
        "jabuticabeiras": [
            { local: "Sala de Estar / Jantar", itens: itensSala },
            { local: "Quarto 1", itens: itensQuarto },
            { local: "Quarto 2", itens: itensQuarto },
            { local: "Banheiro", itens: itensBanheiro },
            { local: "Cozinha / Área de Serviço", itens: itensCozinha }
        ],
        "palmeiras_comum": [
            { local: "Sala de Estar / Jantar", itens: itensSala },
            { local: "Quarto 1", itens: itensQuarto },
            { local: "Quarto 2", itens: itensQuarto },
            { local: "Banheiro 1", itens: itensBanheiro },
            { local: "Banheiro 2", itens: itensBanheiro }, 
            { local: "Cozinha / Área de Serviço", itens: itensCozinha }
        ],
        "palmeiras_duplex": [
            { local: "Sala de Estar / Jantar", itens: itensSala },
            { local: "Quarto 1", itens: itensQuarto },
            { local: "Quarto 2", itens: itensQuarto },
            { local: "Quarto 3", itens: itensQuarto }, 
            { local: "Banheiro 1", itens: itensBanheiro },
            { local: "Banheiro 2", itens: itensBanheiro },
            { local: "Banheiro 3", itens: itensBanheiro }, 
            { local: "Cozinha / Área de Serviço", itens: itensCozinha }
        ],
        "sagrados": [
            { local: "Sala de Estar / Jantar", itens: itensSala },
            { local: "Quarto 1", itens: itensQuarto },
            { local: "Quarto 2", itens: itensQuarto },
            { local: "Banheiro 1", itens: itensBanheiro },
            { local: "Banheiro 2", itens: itensBanheiro }, 
            { local: "Cozinha / Área de Serviço", itens: itensCozinha }
        ]
    };

    let db = []; 

    function init() {
        const saved = JSON.parse(localStorage.getItem('enza_v_v15')) || {};
        
        document.getElementById('modelo-val').value = saved.modelo || "jabuticabeiras";
        document.getElementById('bloco-val').value = saved.bloco || saved.torre || "";
        document.getElementById('apto-val').value = saved.apto || "";
        document.getElementById('resp-val').value = saved.resp || "";
        document.getElementById('data-val').value = saved.d_val || saved.d_ini || ""; 

        renderStructure();
    }

    function changeModelo() {
        const confirmar = confirm("Mudar o modelo de vistoria irá reconfigurar os cômodos. Se você já preencheu dados, certifique-se de salvar ou gerar o PDF antes. Deseja trocar o modelo?");
        
        if (confirmar) {
            const currentSave = JSON.parse(localStorage.getItem('enza_v_v15')) || {};
            const cleanData = { 
                modelo: document.getElementById('modelo-val').value,
                bloco: currentSave.bloco, 
                apto: currentSave.apto, 
                resp: currentSave.resp, 
                d_val: currentSave.d_val 
            };
            localStorage.setItem('enza_v_v15', JSON.stringify(cleanData));
            renderStructure();
        } else {
            const saved = JSON.parse(localStorage.getItem('enza_v_v15')) || {};
            document.getElementById('modelo-val').value = saved.modelo || "jabuticabeiras";
        }
    }

    function renderStructure() {
        const modeloSelect = document.getElementById('modelo-val').value;
        db = templates[modeloSelect]; 
        const saved = JSON.parse(localStorage.getItem('enza_v_v15')) || {};

        const container = document.getElementById('content');
        container.innerHTML = ''; 

        db.forEach((setor, sIdx) => {
            const sec = document.createElement('details');
            sec.className = 'setor-card';
            sec.innerHTML = `<summary class="setor-header">${setor.local}</summary><div id="sec-${sIdx}"></div>`;
            container.appendChild(sec);

            setor.itens.forEach((item, iIdx) => {
                const id = `s${sIdx}i${iIdx}`;
                
                // Resgata os dados antigos (se for array pega o 1º, se não, usa vazio)
                let probData = { st:'', obs:'', img1:'', img2:'', img3:'' };
                if (saved[id] && saved[id].length > 0) {
                    probData = saved[id][0];
                }
                
                const det = document.createElement('details');
                det.className = 'item-details';
                
                let innerHTML = `
                    <summary class="item-summary">${item}</summary>
                    <div class="form-body" id="list-${id}"></div>
                `;
                det.innerHTML = innerHTML;
                document.getElementById(`sec-${sIdx}`).appendChild(det);

                renderProblemBlock(id, probData);
            });
        });
        
        autoSave(); 
    }

    function renderProblemBlock(itemId, data) {
        const list = document.getElementById(`list-${itemId}`);
        const block = document.createElement('div');
        block.className = 'problem-block';
        
        const st = data ? data.st : '';
        const obs = data ? data.obs : '';
        const img1 = data ? (data.img1 || data.img || '') : '';
        const img2 = data ? data.img2 || '' : '';
        const img3 = data ? data.img3 || '' : '';

        block.innerHTML = `
            <div class="field-group">
                <label>Status</label>
                <div class="btn-group">
                    <button class="btn-status btn-aprovado ${st==='APROVADO'?'active':''}" onclick="setStatus(this,'APROVADO')">APROVADO</button>
                    <button class="btn-status btn-pendente ${st==='PENDENTE'?'active':''}" onclick="setStatus(this,'PENDENTE')">PENDENTE</button>
                </div>
            </div>
            <div class="field-group">
                <label>Observação</label>
                <textarea oninput="autoSave()" placeholder="Descreva problemas, soluções ou detalhes importantes...">${obs}</textarea>
            </div>
            <div class="field-group">
                <label>Fotos (Até 3)</label>
                <div class="upload-container">
                    <div class="foto-upload-btn">
                        <span style="font-size: 12px; color: #666; font-weight: bold;">📷 Adicionar Fotos</span>
                        <input type="file" accept="image/*" multiple capture="environment" onchange="processImages(this)">
                    </div>
                    <div class="fotos-preview-container">
                        <div class="img-preview-box" style="display: ${img1 ? 'block' : 'none'}">
                            <img class="img-preview" src="${img1}">
                            <button class="btn-remove-foto" onclick="removeFoto(this)">X</button>
                        </div>
                        <div class="img-preview-box" style="display: ${img2 ? 'block' : 'none'}">
                            <img class="img-preview" src="${img2}">
                            <button class="btn-remove-foto" onclick="removeFoto(this)">X</button>
                        </div>
                        <div class="img-preview-box" style="display: ${img3 ? 'block' : 'none'}">
                            <img class="img-preview" src="${img3}">
                            <button class="btn-remove-foto" onclick="removeFoto(this)">X</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
        list.appendChild(block);
    }

    function setStatus(btn, st) { 
        btn.parentElement.querySelectorAll('.btn-status').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); 
        autoSave(); 
    }

    function processImages(input) {
        const files = Array.from(input.files);
        if (files.length === 0) return;

        const container = input.closest('.upload-container').querySelector('.fotos-preview-container');
        const previewBoxes = container.querySelectorAll('.img-preview-box');
        
        let emptyBoxes = Array.from(previewBoxes).filter(b => b.style.display === 'none' || b.querySelector('.img-preview').src === '');
        
        if (emptyBoxes.length === 0) {
            alert("O limite é de 3 fotos por item. Remova alguma foto antes de adicionar outra.");
            input.value = ''; 
            return;
        }

        const filesToProcess = files.slice(0, emptyBoxes.length);

        filesToProcess.forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = emptyBoxes[index].querySelector('.img-preview');
                img.src = e.target.result;
                emptyBoxes[index].style.display = 'block';
                autoSave();
            };
            reader.readAsDataURL(file);
        });
        input.value = ''; 
    }

    function removeFoto(btn) {
        const box = btn.closest('.img-preview-box');
        box.style.display = 'none';
        box.querySelector('.img-preview').src = '';
        autoSave();
    }

    function autoSave() {
        const modeloSelec = document.getElementById('modelo-val');
        if(!modeloSelec) return;

        const data = { 
            modelo: modeloSelec.value,
            bloco: document.getElementById('bloco-val').value, 
            apto: document.getElementById('apto-val').value,
            resp: document.getElementById('resp-val').value,
            d_val: document.getElementById('data-val').value
        };
        
        db.forEach((setor, sIdx) => {
            setor.itens.forEach((item, iIdx) => {
                const id = `s${sIdx}i${iIdx}`;
                const block = document.querySelector(`#list-${id} .problem-block`);
                if (block) {
                    const previews = block.querySelectorAll('.img-preview');
                    // Salva como array para manter a compatibilidade
                    data[id] = [{
                        st: block.querySelector('.btn-group .active')?.innerText || '',
                        obs: block.querySelector('textarea').value,
                        img1: previews[0].src.includes('data:image') ? previews[0].src : '',
                        img2: previews[1].src.includes('data:image') ? previews[1].src : '',
                        img3: previews[2].src.includes('data:image') ? previews[2].src : ''
                    }];
                }
            });
        });
        localStorage.setItem('enza_v_v15', JSON.stringify(data));
    }

    function manualSave() { autoSave(); alert("✅ Dados e fotos salvos com sucesso!"); }

    function formatDate(dateStr) {
        if(!dateStr) return "";
        return dateStr.split('-').reverse().join('/');
    }

    function exportPDF() {
        window.scrollTo(0, 0);
        autoSave();
        const savedData = JSON.parse(localStorage.getItem('enza_v_v15'));
        
        let nomeModelo = "JABUTICABEIRAS";
        if(savedData.modelo === "palmeiras_comum") nomeModelo = "PALMEIRA REAL COMUM";
        if(savedData.modelo === "palmeiras_duplex") nomeModelo = "PALMEIRA REAL DUPLEX";
        if(savedData.modelo === "sagrados") nomeModelo = "SAGRADOS CORAÇÕES";

        document.getElementById('pdf-modelo-text').innerText = nomeModelo;
        document.getElementById('pdf-bloco-text').innerText = savedData.bloco;
        document.getElementById('pdf-apto-text').innerText = savedData.apto;
        document.getElementById('pdf-resp-text').innerText = savedData.resp;
        document.getElementById('pdf-data-text').innerText = formatDate(savedData.d_val);

        const tbody = document.getElementById('pdf-table-body'); 
        tbody.innerHTML = "";

        db.forEach((setor, sIdx) => {
            let setorRendered = false; 
            
            setor.itens.forEach((item, iIdx) => {
                const id = `s${sIdx}i${iIdx}`;
                const probs = savedData[id] || [];
                // Pega sempre o primeiro (único)
                const p = probs.length > 0 ? probs[0] : {st:'', obs:'', img1:'', img2:'', img3:''};

                const tr = document.createElement('tr');
                const obsFmt = p.obs ? p.obs.replace(/\n/g, '<br>') : '';
                let html = "";
                
                if (!setorRendered) {
                    // O rowspan agora é exatamente a quantidade de itens do setor
                    html += `<td rowspan="${setor.itens.length}" class="col-local">${setor.local}</td>`;
                    setorRendered = true;
                }

                html += `<td class="col-item">${item}</td>`;

                let imgHtml = '';
                if (p.img1) imgHtml += `<img src="${p.img1}" class="pdf-img">`;
                if (p.img2) imgHtml += `<img src="${p.img2}" class="pdf-img">`;
                if (p.img3) imgHtml += `<img src="${p.img3}" class="pdf-img">`;

                let stColor = 'black';
                if (p.st === 'PENDENTE') stColor = '#d4ac0d'; 
                if (p.st === 'APROVADO') stColor = '#27ae60'; 

                html += `
                    <td class="col-st" style="color:${stColor}; font-weight: bold;">${p.st}</td>
                    <td class="col-obs">${obsFmt}</td>
                    <td class="col-foto">${imgHtml}</td>
                `;
                
                tr.innerHTML = html;
                tbody.appendChild(tr);
            });
        });

        const element = document.getElementById('pdf-template');
        element.style.display = 'block';

        const opt = { 
            margin: [5, 5, 5, 5], 
            filename: `Vistoria_${nomeModelo}_Bl${savedData.bloco}_Ap${savedData.apto}.pdf`, 
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true }, 
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' } 
        };

        html2pdf().set(opt).from(element).save().then(() => {
            element.style.display = 'none';
        });
    }
    
    init();
</script>
</body>
</html>
